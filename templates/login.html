<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Interview System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Interviewer Login</h1>
        <form action="/login" method="POST">
            <div style="margin-bottom: 15px; text-align: left;">
                <label>Username:</label>
                <input type="text" name="username" style="width: 100%; padding: 8px;" required>
            </div>
            <div style="margin-bottom: 20px; text-align: left;">
                <label>Password:</label>
                <input type="password" name="password" style="width: 100%; padding: 8px;" required>
            </div>
            <button type="submit" style="width: 100%; background-color: #1a73e8; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">Login</button>
        </form>
        <p style="margin-top: 15px; font-size: 0.8rem; color: #666;">(Use admin / password)</p>
    </div>
</body>
</html>
